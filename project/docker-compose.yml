version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: civicpulse-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    container_name: civicpulse-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      PORT: 5000
      API_VERSION: v1
      MONGODB_URI: mongodb://mongo:27017/citizen-feedback
      JWT_SECRET: dev-jwt-secret-change-me-please-32-chars
      JWT_EXPIRE: 15m
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me-please-32
      JWT_REFRESH_EXPIRE: 7d
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  mongo-data:
